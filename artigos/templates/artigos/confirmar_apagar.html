{% extends "portfolio/base.html" %}
{% block titulo %}Apagar Artigo{% endblock titulo %}
{% block content %}
<div style="max-width:500px; margin:60px auto; padding:20px; text-align:center;">
    <h1>Apagar Artigo</h1>
    <p>Tens a certeza que queres apagar <strong>"{{ artigo.titulo }}"</strong>?</p>
    <p style="color:#dc3545;">Esta acao nao pode ser desfeita.</p>
    <form method="post" style="display:flex; gap:12px; justify-content:center; margin-top:24px;">
        {% csrf_token %}
        <button type="submit" style="background:#dc3545; color:white; padding:10px 24px; border:none; border-radius:6px; cursor:pointer;">Sim, apagar</button>
        <a href="{% url 'detalhe_artigo' artigo.pk %}" style="padding:10px 24px; border:1px solid #ddd; border-radius:6px; text-decoration:none; color:#333;">Cancelar</a>
    </form>
</div>
{% endblock content %}
