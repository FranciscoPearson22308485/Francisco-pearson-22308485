{% extends "escola_online/base.html" %}
{% block content %}
<h2>Alunos</h2>
<section>
    {% for aluno in alunos %}
    <article>
        <header>
            <h3>{{ aluno.nome }}</h3>
            <p>Número: {{ aluno.numero }}</p>
        </header>
        <section>
            <h4>Cursos</h4>
            <ul>
                {% for curso in aluno.cursos.all %}
                    <li>
                        <a href="{% url 'escola_online:curso' curso.id %}" style="color: white; text-decoration: none;">
                        {{ curso.nome }}
                        </a>
                    </li>
                {% empty %}
                    <li>Sem cursos</li>
                {% endfor %}
            </ul>
        </section>
    </article>
    {% endfor %}
</section>
{% endblock %}
